<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SICGAS — Robot Facturación</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap');

  :root {
    --bg:     #0d0f12;
    --panel:  #151820;
    --border: #2a2f3d;
    --accent: #f5a623;
    --green:  #39d98a;
    --red:    #ff4f5e;
    --blue:   #4a90e2;
    --bac:    #a78bfa;
    --text:   #dce3f0;
    --muted:  #6b7589;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow Condensed', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* HEADER */
  header {
    background: var(--panel);
    border-bottom: 2px solid var(--accent);
    padding: 18px 30px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo     { font-family:'Share Tech Mono',monospace; font-size:22px; color:var(--accent); letter-spacing:2px; }
  .subtitle { font-size:13px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
  .dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--green); box-shadow:0 0 8px var(--green);
    margin-left:auto; animation:blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* MAIN */
  main { max-width:960px; margin:30px auto; padding:0 20px; display:grid; gap:18px; }

  /* CARD */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px 24px;
  }
  .card-title {
    font-size:11px; text-transform:uppercase; letter-spacing:2px;
    color:var(--muted); margin-bottom:14px;
    border-bottom:1px solid var(--border); padding-bottom:8px;
  }

  /* ROWS */
  .row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }

  /* FILE INPUT */
  #pdfFile {
    flex:1; min-width:200px;
    background:#0d0f12; border:1px dashed var(--border);
    color:var(--text); padding:10px 14px;
    font-family:'Share Tech Mono',monospace; font-size:13px;
    border-radius:3px; cursor:pointer;
  }
  #pdfFile:hover { border-color:var(--accent); }

  /* BAC INPUT */
  .bac-label {
    font-size:13px; letter-spacing:1px; text-transform:uppercase;
    color:var(--bac); white-space:nowrap;
  }
  #montoBAC {
    width:160px; background:#0d0f12;
    border:1px solid var(--bac); border-radius:3px;
    color:var(--bac); padding:10px 14px;
    font-family:'Share Tech Mono',monospace; font-size:16px;
    outline:none;
  }
  #montoBAC:focus { box-shadow:0 0 0 2px rgba(167,139,250,.3); }
  .bac-hint {
    font-size:12px; color:var(--muted); margin-top:6px;
    font-family:'Share Tech Mono',monospace;
  }

  /* BUTTONS */
  .btn {
    padding:10px 22px;
    font-family:'Barlow Condensed',sans-serif; font-size:15px;
    font-weight:700; letter-spacing:1px; text-transform:uppercase;
    border:none; border-radius:3px; cursor:pointer;
    transition:opacity .15s, transform .1s;
  }
  .btn:active  { transform:scale(.97); }
  .btn-primary  { background:var(--accent); color:#000; }
  .btn-secondary{ background:var(--blue);   color:#fff; }
  .btn-export   { background:var(--green);  color:#000; }

  /* STATUS */
  #status {
    font-family:'Share Tech Mono',monospace; font-size:13px;
    color:var(--green); margin-top:12px; min-height:18px;
  }

  /* RESULTADO */
  #resultado { display:grid; gap:18px; }

  .grupo h3 {
    font-size:14px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--accent); margin-bottom:8px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }

  /* BADGES */
  .badge {
    font-size:11px; font-weight:700; letter-spacing:.5px;
    padding:2px 8px; border-radius:2px; text-transform:uppercase;
  }
  .badge.bac { background:rgba(167,139,250,.15); color:var(--bac); border:1px solid var(--bac); }
  .badge.ef  { background:rgba(57,217,138,.12);  color:var(--green); border:1px solid var(--green); }

  /* TABLE */
  table { width:100%; border-collapse:collapse; font-size:14px; }
  thead tr { background:#1c2030; }
  th {
    text-align:left; padding:7px 12px;
    font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--muted);
  }
  td { padding:6px 12px; border-bottom:1px solid var(--border); font-family:'Share Tech Mono',monospace; font-size:13px; }
  tr:hover td { background:#1a1f2e; }
  tr.negativo td  { color:var(--red); }
  tr.fila-bac td:last-child { color:var(--bac); }
  tr.fila-ef  td:last-child { color:var(--green); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">SICGAS</div>
    <div class="subtitle">Robot de Facturación · v2.1</div>
  </div>
  <div class="dot"></div>
</header>

<main>

  <!-- PASO 1: PDF -->
  <div class="card">
    <div class="card-title">📂 1 · Cargar Reporte PDF</div>
    <div class="row">
      <input type="file" id="pdfFile" accept=".pdf">
      <button class="btn btn-primary" onclick="leerPDF()">Leer PDF</button>
    </div>
    <div id="status"></div>
  </div>

  <!-- PASO 2: BAC -->
  <div class="card">
    <div class="card-title">💳 2 · Monto a Facturar por Tarjeta BAC</div>
    <div class="row">
      <span class="bac-label">$ BAC</span>
      <input type="number" id="montoBAC" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="bac-hint">Dejar en 0 si todo es efectivo. Las facturas BAC se generan primero, luego efectivo.</div>
  </div>

  <!-- PASO 3: ACCIONES -->
  <div class="card">
    <div class="card-title">⚙️ 3 · Generar y Exportar</div>
    <div class="row">
      <button class="btn btn-secondary" onclick="generarFacturas()">Generar Facturas</button>
      <button class="btn btn-export"    onclick="exportar()">Exportar Robot TXT</button>
    </div>
  </div>

  <div id="resultado"></div>

</main>

<script src="app.js"></script>
</body>
</html>
